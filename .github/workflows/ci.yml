name: QA Automation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate required secrets
        run: |
          if [ -z "$REQRES_API_KEY" ]; then
            echo "ERROR: REQRES_API_KEY secret is not set. Add it in Settings > Secrets."
            exit 1
          fi
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        env:
          BASE_URL_API: ${{ vars.BASE_URL_API || 'https://reqres.in' }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: npm run test:api

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-report
          path: reports/
          if-no-files-found: ignore
          retention-days: 30

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BASE_URL_E2E: ${{ vars.BASE_URL_E2E || 'https://www.saucedemo.com' }}
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME || 'standard_user' }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD || 'secret_sauce' }}
        run: npm run test:e2e

      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-report
          path: reports/
          if-no-files-found: ignore
          retention-days: 30
