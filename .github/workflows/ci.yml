name: QA Automation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Load test completo toda segunda-feira às 03:00 UTC
    - cron: '0 3 * * 1'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate required secrets
        run: |
          if [ -z "$REQRES_API_KEY" ]; then
            echo "ERROR: REQRES_API_KEY secret is not set. Add it in Settings > Secrets."
            exit 1
          fi
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        env:
          BASE_URL_API: ${{ vars.BASE_URL_API || 'https://reqres.in' }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: npm run test:api

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-report
          path: reports/
          if-no-files-found: ignore
          retention-days: 30

  k6-tests:
    name: K6 Load Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Create reports directory
        run: mkdir -p reports/k6

      - name: Run K6 smoke test (CI)
        if: github.event_name != 'schedule'
        env:
          K6_SCENARIO: smoke
        run: npm run test:k6:mock

      - name: Run K6 load test completo (scheduled)
        if: github.event_name == 'schedule'
        run: npm run test:k6:mock

      - name: Generate K6 HTML report
        if: always()
        run: node k6/generate-report.js

      - name: Upload K6 report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-load-test-report
          path: reports/k6/
          if-no-files-found: ignore
          retention-days: 30

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BASE_URL_E2E: ${{ vars.BASE_URL_E2E || 'https://www.saucedemo.com' }}
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME || 'standard_user' }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD || 'secret_sauce' }}
        run: npm run test:e2e

      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-report
          path: reports/
          if-no-files-found: ignore
          retention-days: 30

  mobile-tests:
    name: Mobile Tests (Android)
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (mobile)
        run: npx tsc --project mobile/tsconfig.json --noEmit

      - name: Start Appium server
        run: npx appium &
        shell: bash

      - name: Wait for Appium to be ready
        run: |
          for i in $(seq 1 15); do
            curl -s http://127.0.0.1:4723/status && break
            echo "Waiting for Appium... ($i)"
            sleep 2
          done
        shell: bash

      - name: Run Mobile tests
        run: npm run test:mobile

      - name: Generate Allure report
        if: always()
        run: node mobile/generate-report.js

      - name: Upload Mobile test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-test-report
          path: mobile/reports/allure-html/
          if-no-files-found: ignore
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clone gh-pages branch into a sibling folder
          DEPLOY_DIR="../gh-pages-deploy"
          git clone --branch gh-pages --single-branch "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "$DEPLOY_DIR"

          # Root redirect
          printf '<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="utf-8">\n  <meta http-equiv="refresh" content="0; url=mobile/">\n  <title>QA Report</title>\n</head>\n<body>\n  <p>Redirecting to <a href="mobile/">mobile report</a>...</p>\n</body>\n</html>\n' > "$DEPLOY_DIR/index.html"

          # Copy Allure report into mobile/
          rm -rf "$DEPLOY_DIR/mobile"
          cp -r mobile/reports/allure-html "$DEPLOY_DIR/mobile"

          cd "$DEPLOY_DIR"
          git add -A
          git diff --cached --quiet && echo "Nothing to deploy" || \
            git commit -m "deploy: allure mobile report (${{ github.sha }})" && \
            git push origin gh-pages
